<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Challenge</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header class="navbar">
    <div class="navbar-left">
        <div class="logo">FitTrack</div>
        <nav class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/feed">Feed</a>
            <a href="/challenges">Challenges</a>
        </nav>
    </div>
    <div class="navbar-right">
        <a href="/deconnexion" class="logout" title="Déconnexion">
            <svg xmlns="http://www.w3.org/2000/svg"
                 width="22" height="22"
                 viewBox="0 0 24 24"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2"
                 stroke-linecap="round"
                 stroke-linejoin="round">
                <path d="M10 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h5"/>
                <polyline points="17 16 22 12 17 8"/>
                <line x1="22" y1="12" x2="10" y2="12"/>
            </svg>
        </a>
        <a th:href="@{/profil}">
            <img th:src="@{https://ui-avatars.com/api/(name=${session.utilisateur.pseudo},background='random',size=128)}" class="profile-pic" alt="profile">
        </a>
    </div>
</header>

<div style="max-width: 500px; margin: 40px auto; padding: 0 20px;">
    <h1>Créer un Challenge</h1>

    <p th:if="${error}" style="color:red;" th:text="${error}"></p>

    <form th:action="@{/challenges/creer}" th:object="${challenge}" method="post">
        <label>Titre</label>
        <input type="text" th:field="*{titre}" required>
        <br><br>

        <label>Type Sport</label>
        <select th:field="*{typeSport}">
            <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
        </select>
        <br><br>

        <label>Date début</label>
        <input type="date" th:field="*{dateDebut}" required>
        <br><br>

        <label>Date fin</label>
        <input type="date" th:field="*{dateFin}" required>
        <br><br>

        <label>Objectif basé sur (Unité)</label>
        <select th:field="*{unite}" required>
            <option th:each="u : ${unites}" th:value="${u}" th:text="${u.code}"></option>
        </select>
        <br><br>

        <label>Cible à atteindre (Optionnel)</label>
        <input type="number" step="0.1" th:field="*{cible}" placeholder="Ex: 50 (pour 50 km) ou laissez vide">
        <br><br>

        <button type="submit">Créer</button>
    </form>

    <br>
    <a href="/challenges">← Retour</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Créer un Challenge - FitTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{barNavigation :: navbar}"></div>

<main class="main-container">
    <h2 class="form-heading">Créer un Nouveau Challenge</h2>

    <p th:if="${error}" class="limit-warning" style="text-align: center;" th:text="${error}"></p>

    <form th:action="@{/challenges/creer}" th:object="${challenge}" method="post">
        
        <label>Titre</label>
        <input type="text" th:field="*{titre}" placeholder="Ex: Défi 100km en 30 jours" required>

        <label>Type de Sport</label>
        <select th:field="*{typeSport}">
            <option th:each="t : ${types}" th:value="${t}" th:text="${t}"></option>
        </select>

        <label>Date de début</label>
        <input type="date" th:field="*{dateDebut}" required>

        <label>Date de fin</label>
        <input type="date" th:field="*{dateFin}" required>

        <label>Objectif basé sur (Unité)</label>
        <select th:field="*{unite}" required>
            <option th:each="u : ${unites}" th:value="${u}" th:text="${u.code}"></option>
        </select>

        <label>Cible à atteindre (Optionnel)</label>
        <input type="number" step="0.1" th:field="*{cible}" placeholder="Ex: 50 (pour 50 km) ou laissez vide">

        <div class="submit-group">
            <button type="submit">Créer le challenge</button>
            <a href="/challenges" class="cancel-link">← Annuler et Retour</a>
        </div>
    </form>
</main>

</body>
</html>

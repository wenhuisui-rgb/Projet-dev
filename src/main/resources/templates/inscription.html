<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - SportApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">Créer un compte</h2>
                    
                    <div th:if="${erreur}" class="alert alert-danger" role="alert" th:text="${erreur}"></div>

                    <form th:action="@{/inscription}" th:object="${utilisateur}" method="post">
                        
                        <h5 class="mb-3">Informations de base (Obligatoire)</h5>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="pseudo" class="form-label">Pseudo</label>
                                <input type="text" class="form-control" id="pseudo" name="pseudo" required>
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="motDePasse" class="form-label">Mot de passe</label>
                                <input type="password" class="form-control" id="motDePasse" name="motDePasse" required>
                            </div>
                            <div class="col-md-6">
                                <label for="sexe" class="form-label">Sexe</label>
                                <select class="form-select" id="sexe" name="sexe" required>
                                    <option value="" selected disabled>Choisir...</option>
                                    <option value="HOMME">Homme</option>
                                    <option value="FEMME">Femme</option>
                                    <option value="AUTRE">Autre</option>
                                </select>
                            </div>
                        </div>

                        <hr class="my-4">
                        <h5 class="mb-3">Profil Sportif (Optionnel)</h5>
                        
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="age" class="form-label">Âge</label>
                                <input type="number" class="form-control" id="age" name="age" min="10" max="100">
                            </div>
                            <div class="col-md-4">
                                <label for="taille" class="form-label">Taille (m)</label>
                                <input type="number" step="0.01" class="form-control" id="taille" name="taille" placeholder="ex: 1.75">
                            </div>
                            <div class="col-md-4">
                                <label for="poids" class="form-label">Poids (kg)</label>
                                <input type="number" step="0.1" class="form-control" id="poids" name="poids" placeholder="ex: 70.5">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="niveauPratique" class="form-label">Niveau de Pratique</label>
                            <select class="form-select" id="niveauPratique" name="niveauPratique">
                                <option value="" selected>Sélectionnez un niveau</option>
                                <option value="DEBUTANT">Débutant</option>
                                <option value="INTERMEDIAIRE">Intermédiaire</option>
                                <option value="AVANCE">Avancé</option>
                            </select>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-success btn-block">S'inscrire</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-3">
                        <p>Déjà un compte ? <a th:href="@{/connexion}" class="text-decoration-none">Se connecter</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>

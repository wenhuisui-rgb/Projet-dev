<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscription - FitTrack</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="navbar">
    <div class="navbar-left">
        <div class="logo">FitTrack</div>
    </div>
    <div class="navbar-right"></div>
</header>

<div style="max-width: 600px; margin: 60px auto; padding: 20px;">
    <div style="background: white; border-radius: 16px; padding: 30px; border: 1px solid #e5e7eb;">
        <h2 style="text-align: center; margin-bottom: 20px;">Créer un compte</h2>
        
        <div th:if="${erreur}" style="color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 8px; margin-bottom: 15px;" th:text="${erreur}"></div>

        <form th:action="@{/inscription}" th:object="${utilisateur}" method="post">
            
            <h5 style="margin-bottom: 15px;">Profil - Champs obligatoires</h5>
            <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label for="pseudo" style="display: block; font-size: 13px; margin-bottom: 5px;">Pseudo</label>
                    <input type="text" id="pseudo" name="pseudo" required style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb;">
                </div>
                <div style="flex: 1;">
                    <label for="email" style="display: block; font-size: 13px; margin-bottom: 5px;">Email</label>
                    <input type="email" id="email" name="email" required style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb;">
                </div>
            </div>

            <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label for="motDePasse" style="display: block; font-size: 13px; margin-bottom: 5px;">Mot de passe</label>
                    <input type="password" id="motDePasse" name="motDePasse" required style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb;">
                </div>
                <div style="flex: 1;">
                    <label for="sexe" style="display: block; font-size: 13px; margin-bottom: 5px;">Sexe</label>
                    <select id="sexe" name="sexe" required style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb;">
                        <option value="" selected disabled></option>
                        <option value="HOMME">Homme</option>
                        <option value="FEMME">Femme</option>
                        <option value="AUTRE">Autre</option>
                    </select>
                </div>
            </div>

            <hr style="margin: 20px 0;">

            <h5 style="margin-bottom: 15px;">Profil sportif - Optionnel</h5>
            
            <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label for="age" style="display: block; font-size: 13px; margin-bottom: 5px;">Age</label>
                    <input type="number" id="age" name="age" min="10" max="100" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb;">
                </div>
                <div style="flex: 1;">
                    <label for="taille" style="display: block; font-size: 13px; margin-bottom: 5px;">Taille - m</label>
                    <input type="number" step="0.01" id="taille" name="taille" placeholder="ex: 1.75" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb;">
                </div>
                <div style="flex: 1;">
                    <label for="poids" style="display: block; font-size: 13px; margin-bottom: 5px;">Poids - kg</label>
                    <input type="number" step="0.1" id="poids" name="poids" placeholder="ex: 70.5" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb;">
                </div>
            </div>

            <div style="margin-bottom: 20px;">
                <label for="niveauPratique" style="display: block; font-size: 13px; margin-bottom: 5px;">Niveau de pratique</label>
                <select id="niveauPratique" name="niveauPratique" style="width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb;">
                    <option value="" selected>Selectionnez un niveau</option>
                    <option value="DEBUTANT">Debutant</option>
                    <option value="INTERMEDIAIRE">Intermediaire</option>
                    <option value="AVANCE">Avance</option>
                </select>
            </div>

            <button type="submit" style="width: 100%; padding: 12px; background: #111827; color: white; border: none; border-radius: 10px; cursor: pointer;">S'inscrire</button>
        </form>
        
        <div style="text-align: center; margin-top: 15px;">
            <p style="font-size: 14px;">Deja un compte ? <a href="/connexion" style="color: #3b82f6; text-decoration: none;">Se connecter</a></p>
        </div>
    </div>
</div>

</body>
</html>

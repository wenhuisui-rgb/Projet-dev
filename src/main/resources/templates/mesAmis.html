<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes Amis</title>
</head>

<body>

<h1>👥 Mes Amis</h1>

<!-- ========================= -->
<!-- RECHERCHE -->
<!-- ========================= -->
<form th:action="@{/mesAmis}" method="get">
    <input type="text" name="search" placeholder="Rechercher...">
    <button type="submit">Rechercher</button>
</form>

<hr>

<!-- ========================= -->
<!-- RESULTATS -->
<!-- ========================= -->
<div th:if="${resultats != null}">

    <h2>Résultats</h2>

    <div th:each="user : ${resultats}">

        <span th:text="${user.pseudo}"></span>

        <!-- ✔ bouton sécurisé -->
        <div th:if="${demandesEnvoyees != null and demandesEnvoyees.contains(user.id)}">
            ⏳ Demande envoyée
        </div>

        <a th:if="${demandesEnvoyees == null or !demandesEnvoyees.contains(user.id)}"
           th:href="@{'/amities/ajouter/' + ${user.id}}">
            <button>➕ Ajouter</button>
        </a>

    </div>

</div>

<hr>

<!-- ========================= -->
<!-- DEMANDES RECUES -->
<!-- ========================= -->
<h2>📩 Demandes reçues</h2>

<div th:if="${demandesRecues != null and !demandesRecues.isEmpty()}">

    <div th:each="d : ${demandesRecues}">

        <span th:text="${d.utilisateurDemandeur.pseudo}"></span>

        <a th:href="@{'/amities/' + ${d.id} + '/accepter'}">
            <button>✔ Accepter</button>
        </a>

        <a th:href="@{'/amities/' + ${d.id} + '/refuser'}">
            <button>❌ Refuser</button>
        </a>

    </div>

</div>

<div th:if="${demandesRecues == null or demandesRecues.isEmpty()}">
    <p>Aucune demande en attente</p>
</div>

<hr>

<!-- ========================= -->
<!-- AMIS -->
<!-- ========================= -->
<h2>Mes amis</h2>

<div th:if="${amis != null and !amis.isEmpty()}">
    <div th:each="ami : ${amis}">
        <span th:text="${ami.pseudo}"></span>
    </div>
</div>

<div th:if="${amis == null or amis.isEmpty()}">
    <p>Aucun ami 😢</p>
</div>

</body>
</html>

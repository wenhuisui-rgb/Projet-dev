<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${objectif.id == null ? 'Nouvel objectif' : 'Modifier l''objectif'}">Objectif</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-left">
            <div class="logo">SportifApp</div>
            <div class="nav-links">
                <a th:href="@{/dashboard}">Mon Profil</a>
                <a href="/profil#objectifs" class="active">Objectifs</a>
                <a href="/profil#activites">Activités</a>
            </div>
        </div>
        <div class="navbar-right">
            <a th:href="@{/deconnexion}" class="logout" title="Se déconnecter">
                <i class="fa-solid fa-arrow-right-from-bracket icon-lg"></i>
            </a>
        </div>
    </nav>

    <main class="main-container">
        
        <form th:action="@{${objectif.id == null ? '/objectifs/sauvegarder' : '/objectifs/modifier/' + objectif.id}}" 
              th:object="${objectif}" 
              method="post">
              
            <h1 class="form-heading" th:text="${objectif.id == null ? 'Définir un nouvel objectif' : 'Modifier votre objectif'}">
            </h1>

            <input type="hidden" th:field="*{id}" />
            
            <div>
                <label>Description *</label>
                <input type="text" th:field="*{description}" placeholder="Ex: Courir 50 km" required>
            </div>
            
            <div>
                <label>Type de sport</label>
                <select th:field="*{typeSport}">
                    <option value="">Tous les sports (Objectif général)</option>
                    <option th:each="sport : ${typesSport}" th:value="${sport}" th:text="${sport}"></option>
                </select>
            </div>
            
            <div>
                <label>Objectif cible *</label>
                <input type="number" th:field="*{cible}" step="0.1" placeholder="Valeur numérique" required>
            </div>
            
            <div>
                <label>Unité *</label>
                <select th:field="*{unite}" required>
                    <option value="">Sélectionnez une unité</option>
                    <option value="KM">Kilomètres</option>
                    <option value="MINUTES">Minutes</option>
                    <option value="KCAL">Calories - kcal</option>
                </select>
            </div>
            
            <div>
                <label>Période *</label>
                <select th:field="*{periode}" required>
                    <option value="">Sélectionnez une période</option>
                    <option th:each="p : ${periodes}" th:value="${p.name()}" th:text="${p.libelle}"></option>
                </select>
            </div>
            
            <div>
                <label>Date de début <span class="type font-normal">(Laissez vide pour aujourd'hui)</span></label>
                <input type="date" th:field="*{dateDebut}">
            </div>
            
            <div>
                <label>Date de fin <span class="type font-normal">(Laissez vide pour calculer auto.)</span></label>
                <input type="date" th:field="*{dateFin}">
            </div>
            
            <div class="submit-group">
                <button type="submit" th:text="${objectif.id == null ? 'Créer l''objectif' : 'Mettre à jour'}">
                    Créer l'objectif
                </button>
                <a th:href="@{/profil}" class="cancel-link">
                    Annuler et retourner
                </a>
            </div>
        </form>

    </main>
</body>
</html>

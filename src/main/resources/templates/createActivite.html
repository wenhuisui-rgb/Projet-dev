<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvelle activité</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="navbar">
    <div class="navbar-left">
        <div class="logo">FitTrack</div>
        <nav class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/feed">Feed</a>
            <a href="/challenges">Challenges</a>
        </nav>
    </div>
    <div class="navbar-right">
        <a href="/deconnexion" class="logout" title="Deconnexion">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h5"/>
                <polyline points="17 16 22 12 17 8"/>
                <line x1="22" y1="12" x2="10" y2="12"/>
            </svg>
        </a>
        <a th:href="@{/profil}">
            <img th:src="@{'https://ui-avatars.com/api/?name=' + ${session.utilisateur.pseudo} + '&background=random&size=128'}" class="profile-pic" alt="profile">
        </a>
    </div>
</header>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                
                <div class="card-body">
                    
                    <form th:action="@{/activites/sauvegarder}" th:object="${activite}" method="post">
                        
                        <h1 style="margin-bottom: 20px;">Nouvelle Activité</h1>
                        <div class="mb-3">
                            <label for="typeSport" class="form-label">Type de sport *</label>
                            <select th:field="*{typeSport}" id="typeSport" class="form-select" required>
                                <option value="">Sélectionnez un sport</option>
                                <option th:each="sport : ${T(com.example.demo.model.TypeSport).values()}" 
                                        th:value="${sport}" th:text="${sport}"></option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="dateActivite" class="form-label">Date et heure *</label>
                            <input type="datetime-local" th:field="*{dateActivite}" id="dateActivite" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="duree" class="form-label">Durée - minutes *</label>
                            <input type="number" th:field="*{duree}" id="duree" class="form-control" min="1" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="distance" class="form-label">Distance - km</label>
                            <input type="number" th:field="*{distance}" id="distance" class="form-control" step="0.01" placeholder="Optionnel - Pour la course, vélo, natation...">
                        </div>
                        
                        <div class="mb-3">
                            <label for="localisation" class="form-label">Localisation</label>
                            <input type="text" th:field="*{localisation}" id="localisation" class="form-control" placeholder="Ex: Parc Montsouris, Paris">
                        </div>
                        
                        <div class="mb-3">
                            <label for="evaluation" class="form-label">Évaluation</label>
                            <select th:field="*{evaluation}" id="evaluation" class="form-select">
                                <option value="">Non évalué</option>
                                <option value="1">⭐ - Très mauvais</option>
                                <option value="2">⭐⭐ - Moyen</option>
                                <option value="3">⭐⭐⭐ - Bien</option>
                                <option value="4">⭐⭐⭐⭐ - Très bien</option>
                                <option value="5">⭐⭐⭐⭐⭐ - Excellent</option>
                            </select>
                        </div>
                        
                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary">Enregistrer</button>
                            <button type="button" class="btn btn-primary" th:onclick="|window.location.href='@{/profil}'|">Annuler</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>

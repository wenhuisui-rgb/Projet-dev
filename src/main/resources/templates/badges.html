<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Badges</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="navbar">
    <div class="navbar-left">
        <div class="logo">FitTrack</div>
        <nav class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/feed">Feed</a>
            <a href="/challenges">Challenges</a>
        </nav>
    </div>
    <div class="navbar-right">
        <a href="/deconnexion" class="logout" title="Deconnexion">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h5"/>
                <polyline points="17 16 22 12 17 8"/>
                <line x1="22" y1="12" x2="10" y2="12"/>
            </svg>
        </a>
        <a th:href="@{/profil}">
            <img th:src="@{'https://ui-avatars.com/api/?name=' + ${session.utilisateur.pseudo} + '&background=random&size=128'}" class="profile-pic" alt="profile">
        </a>
    </div>
</header>

<div style="max-width: 1200px; margin: 40px auto; padding: 20px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1 style="margin: 0;">Mes Badges</h1>
        <button id="toggle-btn" class="filter-btn" onclick="toggleView()" style="padding: 8px 20px; border-radius: 30px; border: 1px solid #e5e7eb; background: white; cursor: pointer;">
            Voir tous les badges
        </button>
    </div>

    <div id="badge-grid" class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;"></div>
</div>

<script th:inline="javascript">
    let showAllMode = false;
    var userId = /*[[${session.utilisateur != null ? session.utilisateur.id : 0}]]*/ 0;

    function getIcon(seuil) {
        if (seuil >= 42) return '👑';
        if (seuil >= 21) return '🥇';
        if (seuil >= 10) return '🥈';
        if (seuil >= 5) return '🥉';
        return '🏅';
    }

    function toggleView() {
        showAllMode = !showAllMode;
        const btn = document.getElementById('toggle-btn');
        btn.innerText = showAllMode ? "Mes badges uniquement" : "Voir tous les badges";
        loadBadges();
    }

    async function loadBadges() {
        try {
            const grid = document.getElementById('badge-grid');
            if (!grid) return;

            const respObtention = await fetch(`/badges/obtention/utilisateur/${userId}`);
            const obtentions = await respObtention.json();
            const obtainedBadgeIds = obtentions.map(o => o.badge.id);

            if (showAllMode) {
                const respAll = await fetch('/api/badges');
                const allBadges = await respAll.json();

                grid.innerHTML = allBadges.map(badge => {
                    const isUnlocked = obtainedBadgeIds.includes(badge.id);
                    return `
                        <div class="stat-card" style="text-align: center; padding: 20px; position: relative; ${isUnlocked ? '' : 'opacity: 0.6; filter: grayscale(0.3);'}">
                            <div style="font-size: 48px; margin-bottom: 10px;">${getIcon(badge.seuil)}</div>
                            <div style="font-weight: bold; font-size: 16px; margin-bottom: 5px;">${badge.nom}</div>
                            <div style="font-size: 12px; color: #6b7280; margin-bottom: 10px;">${badge.description}</div>
                            <div style="font-size: 12px; font-weight: bold; color: ${isUnlocked ? '#10b981' : '#9ca3af'};">
                                ${isUnlocked ? 'DÉBLOQUÉ' : 'VERROUILLÉ'}
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                if (obtentions.length === 0) {
                    grid.innerHTML = '<div style="text-align: center; padding: 50px; color: #6b7280;">Aucun badge débloqué pour le moment.</div>';
                    return;
                }

                grid.innerHTML = obtentions.map(o => `
                    <div class="stat-card" style="text-align: center; padding: 20px;">
                        <div style="font-size: 48px; margin-bottom: 10px;">${getIcon(o.badge.seuil)}</div>
                        <div style="font-weight: bold; font-size: 16px; margin-bottom: 5px;">${o.badge.nom}</div>
                        <div style="font-size: 12px; color: #6b7280; margin-bottom: 10px;">${o.badge.description}</div>
                        <div style="font-size: 12px; font-weight: bold; color: #10b981;">DÉBLOQUÉ</div>
                    </div>
                `).join('');
            }
        } catch (error) {
            console.error("Erreur:", error);
            document.getElementById('badge-grid').innerHTML = '<p style="text-align: center; color: red;">Erreur lors du chargement</p>';
        }
    }

    loadBadges();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profil</title>
</head>
<body>

<div>
    <h1>Profil de <span th:text="${utilisateur.pseudo}"></span></h1>
    
    <div th:if="${isOwner}">
        <a href="/profil/modifier">Modifier mon profil</a>
    </div>
    
    <h2>Informations personnelles</h2>
    
    <div>
        <label>Pseudo :</label>
        <span th:text="${utilisateur.pseudo}"></span>
    </div>
    
    <div>
        <label>Email :</label>
        <span th:text="${utilisateur.email}"></span>
    </div>
    
    <div>
        <label>Sexe :</label>
        <span th:text="${utilisateur.sexe}"></span>
    </div>
    
    <div>
        <label>Age :</label>
        <span th:text="${utilisateur.age}"></span>
    </div>
    
    <div>
        <label>Taille :</label>
        <span th:text="${utilisateur.taille} + ' m'"></span>
    </div>
    
    <div>
        <label>Poids :</label>
        <span th:text="${utilisateur.poids} + ' kg'"></span>
    </div>

    <div>
        <h3>IMC</h3>
        <p th:if="${utilisateur.taille != null and utilisateur.poids != null}">
            IMC : <strong th:text="${utilisateur.calculerIMC()}"></strong>
        </p>
        <p th:unless="${utilisateur.taille != null and utilisateur.poids != null}">
            Non disponible
        </p>
    </div>
    
    <h2>Preferences sportives</h2>
    
    <div>
        <label>Niveau de pratique :</label>
        <span th:text="${utilisateur.niveauPratique}"></span>
    </div>
    
    <div>
        <label>Sports preferes :</label>
        <span th:text="${#strings.listJoin(utilisateur.preferencesSports, ', ')}"></span>
    </div>
    
    <h2>Objectifs</h2>
    
    <div th:if="${isOwner}">
        <a href="/objectifs/nouveau">Ajouter un objectif !</a>
    </div>
    
    <div th:if="${utilisateur.objectifs != null and !utilisateur.objectifs.isEmpty()}">
        <table border="1">
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Sport</th>
                    <th>Cible</th>
                    <th>Periode</th>
                    <th>Progression</th>
                    <th th:if="${isOwner}"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="obj : ${utilisateur.objectifs}">
                    <td th:text="${obj.description}">quan</td>
                    <td th:text="${obj.typeSport != null ? obj.typeSport : 'Tous'}">quan</td>
                    <td th:text="${obj.cible} + ' ' + ${obj.unite}">quan</td>
                    <td th:text="${obj.periode != null ? obj.periode.libelle : '-'}">quan</td>
                    <td>
                        <span th:text="${objectifProgressions[obj.id] != null ? objectifProgressions[obj.id] + '%' : '0%'}"></span>
                    </td>
                    <td th:if="${isOwner}">
                        <a th:href="@{/objectifs/delete/{id}(id=${obj.id})}" 
                           onclick="return confirm('Supprimer cet objectif ?')">Supprimer</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <div th:unless="${utilisateur.objectifs != null and !utilisateur.objectifs.isEmpty()}">
        <p>Aucun objectif defini</p>
    </div>
    
    <hr>
    
    <div>
        <a href="/dashboard">Retour au DashBoard</a>
        <a th:if="${isOwner}" href="/deconnexion">Deconnexion</a>
    </div>
</div>

</body>
</html>
